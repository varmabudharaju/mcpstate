# Visual test evidence for mcpstate. Regenerate any time with:  shotlist run
output:
  dir: docs/screenshots

shots:
  - name: cli-help
    kind: cli
    command: "~/Library/Python/3.11/bin/mcpstate --help"
    style: rendered
    cols: 90
    rows: 14
    alt: "mcpstate --help showing the serve subcommand"

  - name: test-suite
    kind: cli
    command: "python3 -m pytest -q"
    style: rendered
    cols: 90
    rows: 8
    alt: "full pytest suite green"

  # The headline use case, played through the real MCP tools. Each step is a
  # separate OS process sharing one SQLite file, so persistence is genuine.
  - name: use-case
    kind: session
    clear_between: true
    cols: 96
    rows: 15
    steps:
      - name: 1-start
        command: "rm -rf .demo; python3 examples/research_assistant.py start"
        alt: "Conversation 1: the assistant starts durable research and mints a handle"
      - name: 2-collect
        command: "python3 examples/research_assistant.py source 'https://developer.arm.com/documentation/'; python3 examples/research_assistant.py source 'https://aws.amazon.com/ec2/graviton/'"
        alt: "Still conversation 1: two sources appended via commutative patches"
      - name: 3-resume
        command: "python3 examples/research_assistant.py resume"
        alt: "Conversation 2, a brand-new chat: the assistant recovers the full research state"
      - name: 4-conflict
        command: "python3 examples/research_assistant.py conflict"
        alt: "Two devices editing at once: the conflict becomes an agent-mergeable state, no write lost"
      - name: 5-renew
        command: "python3 examples/research_assistant.py renew"
        alt: "TTL renewal: state_touch extends the research's life, then makes it persistent"
